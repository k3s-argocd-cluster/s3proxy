{{- if and (.Values.config.accessKey | not | empty) (.Values.config.secretKey | not | empty) (.Values.config.kmsStaticKey | not | empty) }}
apiVersion: v1
kind: Secret
metadata:
  name: s3proxy
data:
  accesskey: {{ .Values.config.accessKey | b64enc | quote }}
  secretkey: {{ .Values.config.secretKey | b64enc | quote }}
  kmsstatickey: {{ .Values.config.kmsStaticKey | b64enc | quote }}
{{- end }}
