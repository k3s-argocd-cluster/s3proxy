replicaCount: 1

image:
  repository: ghcr.io/k3s-argocd-cluster/s3proxy
  pullPolicy: IfNotPresent
  # tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

args:
  # If non-empty, this fully overrides generated args below.
  # Example:
  # rawOverride: ["--level=-1", "--no-tagging", "--cache=memory"]
  rawOverride: []

  # Generated args (default path)
  # --level
  #  -2 = Trace, -1 = Debug, 0 = Info, 1 = Warning, 2 = Error
  logLevel: 0
  # --no-tls
  noTLS: false
  # --no-tagging
  noTagging: false
  # --cache=<type>
  cache: none
  # Additional arguments appended after generated args.
  extra: []

cert: # From CertManager CRD
  enable: false
  issuerRefKind: ClusterIssuer
  # issuerRefName: internal-company-com
  # commonName: "*.s3proxy.internal.company.com"

config:
  host: s3.us-east-1.amazonaws.com
  # throttling: 5
  # accessKey: CHANGEME
  # secretKey: CHANGEME
  # kmsStaticKey: CHANGEME
  # existentSecret: s3proxy-secret
valsSecret: {}
#   accessKey: ref+vault://s3proxy/secrets/access-key
#   secretKey: ref+vault://s3proxy/secrets/secret-key
#   kmsStaticKey: ref+vault://s3proxy/secrets/kms-static-key

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 4433
  opsPort: 9001

ingress:
  enabled: false

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz  # Liveness endpoint
    port: 9001
    scheme: HTTP
readinessProbe:
  httpGet:
    path: /readyz  # Readiness endpoint
    port: 9001
    scheme: HTTP

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

# Additional volumes on the output Deployment definition.
extraVolumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
extraVolumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
